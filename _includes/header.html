<script>
  // 放在 head 里，只负责改颜色，不涉及图标（因为图标 HTML 还没加载）
  if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
    document.documentElement.setAttribute('data-theme', 'dark');
  } else {
    document.documentElement.setAttribute('data-theme', 'light');
  }
</script>

<!-- defer loading of font and font awesome -->
<noscript id="deferred-styles">
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.0.13/css/all.css" integrity="sha384-DNOHZ68U8hZfKXOrtjWvjxusGo9WQnrNx2sqG0tfsghAvtVlRW3tvkXWZh58N9jp" crossorigin="anonymous">
</noscript>

<svg style="position: absolute; width: 0; height: 0;">
  <filter id="ragged-edge">
    <!-- 产生随机噪点 -->
    <feTurbulence type="fractalNoise" baseFrequency="0.4" numOctaves="5" result="noise" />
    <!-- 将噪点应用在图片的边缘位移上 -->
    <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" />
  </filter>
</svg>

<header class="navigation">
  <nav class="navbar navbar-expand-lg navbar-light">
    <div class="container">
      {% if site.logo %}
        <a class="navbar-brand" href="{{site.baseurl | absolute_url}}"><img class="img-fluid" src="{{site.logo | relative_url}}" alt="{{site.title}}"></a>
      {% endif %}
      <div class="site-name">{{ site.name }}</div>

      <button
        class="navbar-toggler border-0"
        type="button"
        data-toggle="collapse"
        data-target="#navogation"
        aria-controls="navogation"
        aria-expanded="false"
        aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse text-center" id="navogation">
        <ul class="navbar-nav ml-auto">
          {% for menu-item in site.menu %}
            {% if menu-item.submenu %}
              <li class="nav-item dropdown">
                <a
                  class="nav-link text-uppercase text-dark dropdown-toggle"
                  href="#"
                  id="navbarDropdown"
                  role="button"
                  data-toggle="dropdown"
                  aria-haspopup="true"
                  aria-expanded="false">
                  {{ menu-item.name }}
                </a>
                <div class="dropdown-menu" aria-labelledby="navbarDropdown">
                  {% for submenu-item in menu-item.submenu %}
                    <a class="dropdown-item" href="{{submenu-item.url}}">{{ submenu-item.name }}</a>
                  {% endfor %}
                </div>
              </li>
            {% else %}
              <li class="nav-item">
                <a class="nav-link text-uppercase text-dark" href="{{ menu-item.url }}">{{ menu-item.name }}</a>
              </li>
            {% endif %}
          {% endfor %}
        </ul>

        <div class="dark-mode-switch ml-3">
          <button id="theme-toggle" style="background: none; border: none; cursor: pointer; padding: 0; vertical-align: middle;">
            <span id="theme-toggle-dark-icon" style="font-size: 20px;">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path>
              </svg>
            </span>
            <span id="theme-toggle-light-icon" style="display: none; font-size: 20px;"><i class="ti-shine"></i></span>
          </button>
        </div>

        <form class="form-inline position-relative ml-lg-4" action="/search.html" method="get">
          <input class="form-control px-0 w-100" type="search" id="search-box" name="query" placeholder="Search">
          <button class="search-icon" type="submit"><i class="ti-search text-dark"></i></button>
        </form>
      </div>
    </div>
  </nav>
</header>
